name: planora
description: Offline-first personal travel planning app.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: ^8.1.7
  path_provider: ^2.1.5
  open_filex: ^4.7.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2
  url_launcher: ^6.3.1
  receive_sharing_intent: ^1.8.1
  connectivity_plus: ^6.0.0
  http: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
